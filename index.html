<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Gustavo - Pratique</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        header { text-align: center; padding: 15px 0; border-bottom: 2px solid #ff3e3e; margin-bottom: 15px; }
        h1 { color: #ff3e3e; margin: 0; font-size: 22px; text-transform: uppercase; }
        .treino-btn { background: #ff3e3e; color: white; cursor: pointer; padding: 16px; width: 100%; border: none; text-align: left; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 12px; display: flex; justify-content: space-between; }
        .panel-treino { display: none; margin-bottom: 20px; }
        .ex-item { background: #1e1e1e; margin-top: 6px; border-radius: 6px; border-left: 5px solid #444; }
        .ex-header { display: flex; align-items: center; padding: 12px; }
        .ex-name { flex-grow: 1; font-size: 14px; font-weight: 500; cursor: pointer; }
        .ex-done { border-left-color: #4caf50; background: #1a2e1a; }
        .ex-done .ex-name { color: #81c784; text-decoration: line-through; }
        .btn-check { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; margin-left: 10px; cursor: pointer; }
        .ex-content { display: none; padding: 15px; background: #252525; border-top: 1px solid #333; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 12px; background: #000; border-radius: 4px; overflow: hidden; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        input[type="number"] { background: #333; border: 1px solid #555; color: white; padding: 6px; width: 55px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>ACADEMIA - PRATIQUE</h1></header>
        <div id="app"></div>
    </div>

    <script>
        const dados = {
            'Treino A': [
                { n: "ENCOLHIMENTO DE OMBROS - INT", v: "ZygClRlKm9M" },
                { n: "PEITORAL VOADOR - INT", v: "jLl6YEWBD0I" },
                { n: "SUPINO RETO NA BARRA - INT", v: "A02r9Z1N9iY" },
                { n: "TRICEPS CORDA NO CROSS OVER - INT", v: "6YmZ009N5_M" },
                { n: "TRICEPS FRANCES UNILATERAL COM HALTER - INT", v: "49zKsc_FqF0" },
                { n: "ABDOMINAL CANIVETE NO SOLO - INT", v: "ouOMf0AMWEA" },
                { n: "DESENVOLVIMENTO COM HALTERES", v: "3ZwwrTtnGJo" },
                { n: "TRICEPS PULLEY", v: "ZjjzY2IObIU" }
            ],
            'Treino B': [
                { n: "ABDOMINAL OBLIQUO DE LADO - INI", v: "-WjHb4OEpLM" },
                { n: "AGACHAMENTO NA BARRA GUIADA - INT", v: "8pjN_4fkxgU" },
                { n: "BANCO ABDUTOR - INI", v: "uiaPgrCUI58" },
                { n: "BANCO EXTENSOR BILATERAL - INI", v: "UaHI5Pqc__o" },
                { n: "BANCO FLEXOR BILATERAL - INI", v: "e0_xHkXw350" },
                { n: "LEG PRESS 45 - AVA", v: "waAxlYvtCcI" },
                { n: "PANTURRILHA APARELHO VERTICAL - INT", v: "smIfc3JFDDM" },
                { n: "BANCO ADUTOR - INI", v: "WT5qhJZkeYI" }
            ],
            'Treino C': [
                { n: "ABDOMINAL INFRA NA BARRA PARALELA - INT", v: "OcjLM6Weh-0" },
                { n: "ABDOMINAL SUPRA NO APARELHO - INT", v: "jqnwfqpvo9U" },
                { n: "PULLDOWN MAQUINA PRONADO - INT", v: "ATCAVE0I5K4" },
                { n: "PULLEY FRENTE PRONADA ABERTA - INT", v: "hXitE7MOLgo" },
                { n: "REMADA BAIXA NEUTRA FECHADA - INI", v: "sOA-70A6wLY" },
                { n: "ROSCA SCOTT APARELHO - INT", v: "faBk2akE0mQ" },
                { n: "ROSCA ALTERNADA COM HALTERES - INI", v: "ZvHOiAVh6Bk" },
                { n: "DESENVOLVIMENTO NO APARELHO - INI", v: "mkpWMl3SOeQ" },
                { n: "ROSCA MARTELO", v: "CTTsTVZM3Uk" }
            ]
        };

        const app = document.getElementById('app');
        Object.keys(dados).forEach(tNome => {
            let html = `<button class="treino-btn" onclick="const p = this.nextElementSibling; p.style.display = p.style.display === 'block' ? 'none' : 'block'">${tNome} <span>▾</span></button><div class="panel-treino">`;
            dados[tNome].forEach((ex, i) => {
                const id = `${tNome}-${i}`.replace(/\s+/g, '').replace(/[()\/]/g, '');
                const p = localStorage.getItem(`p-${id}`) || "";
                html += `
                <div class="ex-item" id="it-${id}">
                    <div class="ex-header">
                        <span class="ex-name" onclick="const c = document.getElementById('co-${id}'); c.style.display = c.style.display === 'block' ? 'none' : 'block'">${ex.n}</span>
                        <input type="number" value="${p}" placeholder="kg" onchange="localStorage.setItem('p-${id}', this.value)">
                        <button class="btn-check" onclick="document.getElementById('it-${id}').classList.toggle('ex-done')">✅</button>
                    </div>
                    <div class="ex-content" id="co-${id}">
                        <div class="video-wrap">
                            <iframe src="https://www.youtube.com/embed/${ex.v}" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            app.innerHTML += html;
        });
    </script>
</body>
</html>
